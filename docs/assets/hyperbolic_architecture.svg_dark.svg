<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <!-- Definition for directional pointers -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#858585" />
    </marker>
  </defs>

  <!-- Background Frame - Set to transparent for cross-theme compatibility -->
  <rect width="100%" height="100%" fill="transparent"/>

  <!-- Guide Rings / Non-Euclidean Guide Grid -->
  <circle cx="400" cy="400" r="380" fill="none" stroke="#858585" stroke-width="1.5px" />
  <circle cx="400" cy="400" r="260" fill="none" stroke="#A0A0A0" stroke-width="1px" stroke-dasharray="3 3" />
  <circle cx="400" cy="400" r="140" fill="none" stroke="#A0A0A0" stroke-width="1px" stroke-dasharray="3 3" />

  <!-- Core Rays & Connectors -->
  <line x1="400" y1="365" x2="400" y2="280" stroke="#858585" stroke-width="1px" marker-end="url(#arrow)" />
  <line x1="400" y1="240" x2="400" y2="160" stroke="#858585" stroke-width="1px" />
  <line x1="400" y1="120" x2="310" y2="75" stroke="#858585" stroke-width="1px" marker-end="url(#arrow)" />
  <line x1="400" y1="120" x2="490" y2="75" stroke="#858585" stroke-width="1px" marker-end="url(#arrow)" />

  <line x1="330" y1="400" x2="230" y2="400" stroke="#858585" stroke-width="1px" marker-end="url(#arrow)" />
  <line x1="150" y1="400" x2="105" y2="330" stroke="#858585" stroke-width="1px" marker-end="url(#arrow)" />
  <line x1="150" y1="400" x2="90" y2="395" stroke="#858585" stroke-width="1px" marker-end="url(#arrow)" />
  <line x1="150" y1="400" x2="90" y2="465" stroke="#858585" stroke-width="1px" marker-end="url(#arrow)" />
  <line x1="150" y1="400" x2="105" y2="530" stroke="#858585" stroke-width="1px" marker-end="url(#arrow)" />

  <line x1="470" y1="400" x2="570" y2="400" stroke="#858585" stroke-width="1px" marker-end="url(#arrow)" />
  <line x1="650" y1="400" x2="710" y2="350" stroke="#858585" stroke-width="1px" marker-end="url(#arrow)" />
  <line x1="650" y1="400" x2="710" y2="450" stroke="#858585" stroke-width="1px" marker-end="url(#arrow)" />

  <!-- [ORIGIN CENTRAL NODE] -->
  <g transform="translate(400, 400)">
