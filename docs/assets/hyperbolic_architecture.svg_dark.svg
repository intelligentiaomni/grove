    <rect x="-55" y="-20" width="110" height="40" fill="transparent" stroke="#858585" stroke-width="1px" stroke-dasharray="4 2" rx="4" ry="4" />
    <text y="0" font-family="system-ui, monospace" font-size="11px" font-weight="700" fill="#858585" text-anchor="middle" dominant-baseline="middle">[γ_SYS] LEDGER</text>
