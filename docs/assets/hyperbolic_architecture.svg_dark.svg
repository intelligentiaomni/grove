    <text y="-10" font-family="system-ui, monospace" font-size="11px" font-weight="700" fill="#858585" text-anchor="middle" dominant-baseline="middle">MEMORY / IR</text>
    <text y="12" font-family="system-ui, monospace" font-size="9px" fill="#A0A0A0" text-anchor="middle" dominant-baseline="middle">engine-core</text>
  </g>

